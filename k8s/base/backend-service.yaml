apiVersion: v1
kind: Service
metadata:
  name: picopals-backend
  namespace: picopals
  annotations:
    # Container-native load balancing (NEG) so the GKE Ingress routes straight
    # to pods.
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector: { app: picopals-backend }
  ports:
    - port: 8000
      targetPort: 8000
