apiVersion: apps/v1
kind: Deployment
metadata:
  name: picopals-frontend
  namespace: picopals
  labels: { app: picopals-frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: picopals-frontend }
  template:
    metadata:
      labels: { app: picopals-frontend }
    spec:
      containers:
        - name: frontend
          # Built with VITE_API_BASE=/api baked in at image-build time.
          image: REGION-docker.pkg.dev/PROJECT_ID/picopals/frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
