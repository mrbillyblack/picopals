# TEMPLATE ONLY — safe to commit (no real values).
#
# Preferred path: use external-secret.yaml + Secret Manager, and DON'T create
# this Secret at all. If you instead want to manage the Secret manually, copy
# this to `secret.yaml` (which is gitignored), fill in real values, and add it
# to the kustomization resources. Never commit the filled-in version.
apiVersion: v1
kind: Secret
metadata:
  name: picopals-secrets
  namespace: picopals
type: Opaque
stringData:
  # Host is 127.0.0.1 because the Cloud SQL Auth Proxy sidecar listens locally.
  DATABASE_URL: "mysql+pymysql://tama:CHANGEME@127.0.0.1:3306/picopals"
  MYSQL_USER: "tama"
  MYSQL_PASSWORD: "CHANGEME"
