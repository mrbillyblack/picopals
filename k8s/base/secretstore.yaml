# Tells the External Secrets Operator how to read from GCP Secret Manager,
# authenticating as the picopals KSA via Workload Identity.
# Requires ESO installed in the cluster (see k8s/README.md).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-store
  namespace: picopals
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: "REGION"
          clusterName: "CLUSTER_NAME"
          serviceAccountRef:
            name: picopals
