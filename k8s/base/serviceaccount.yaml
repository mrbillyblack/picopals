# Kubernetes ServiceAccount bound to a GCP IAM service account via Workload
# Identity. This is how pods authenticate to Secret Manager / Cloud SQL without
# any key files. After applying, create the binding (see k8s/README.md):
#
#   gcloud iam service-accounts add-iam-policy-binding \
#     picopals@PROJECT_ID.iam.gserviceaccount.com \
#     --role roles/iam.workloadIdentityUser \
#     --member "serviceAccount:PROJECT_ID.svc.id.goog[picopals/picopals]"
apiVersion: v1
kind: ServiceAccount
metadata:
  name: picopals
  namespace: picopals
  annotations:
    iam.gke.io/gcp-service-account: picopals@PROJECT_ID.iam.gserviceaccount.com
