# Pulls secret VALUES from GCP Secret Manager and materialises them into a
# regular Kubernetes Secret named "picopals-secrets", which the backend then
# consumes via envFrom. No secret values live in git — only these references.
#
# Create the upstream secrets once, e.g.:
#   printf 'mysql+pymysql://tama:PWD@127.0.0.1:3306/picopals' \
#     | gcloud secrets create picopals-database-url --data-file=-
#   printf 'PWD' | gcloud secrets create picopals-mysql-password --data-file=-
#   printf 'tama' | gcloud secrets create picopals-mysql-user --data-file=-
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: picopals-secrets
  namespace: picopals
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: SecretStore
  target:
    name: picopals-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: picopals-database-url
    - secretKey: MYSQL_USER
      remoteRef:
        key: picopals-mysql-user
    - secretKey: MYSQL_PASSWORD
      remoteRef:
        key: picopals-mysql-password
