apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: picopals

# NOTE: secret.example.yaml is intentionally NOT listed — it's a template.
# Secrets arrive via external-secret.yaml (Secret Manager), not from git.
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secretstore.yaml
  - external-secret.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - managed-certificate.yaml
  - ingress.yaml
